<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTS MVP</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; overflow: hidden; }
      body { display: flex; }
      #app { flex: 1; min-width: 0; min-height: 0; position: relative; }
      canvas { display: block; width: 100%; height: 100%; }
      #loading {
        position: absolute; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(10,10,10,0.92);
        color: #7cf07c;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        gap: 14px;
        z-index: 100;
      }
      #loading .title { font-size: 18px; font-weight: bold; }
      #loading .status { font-size: 13px; color: #cccccc; max-width: 80%; text-align: center; line-height: 1.4; }
      #loading .spin {
        width: 26px; height: 26px;
        border: 3px solid rgba(124,240,124,0.2);
        border-top-color: #7cf07c;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <div id="loading">
        <div class="spin"></div>
        <div class="title">Initializing AI Player…</div>
        <div class="status" id="loading-status">Loading game manual into Nanoclaw agent. First LLM round-trip can take 30–60s.</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
