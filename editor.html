<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTS Map Editor</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #151511;
        color: #ece7d8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #app {
        position: fixed;
        inset: 0 240px 0 0;
        min-width: 0;
        min-height: 0;
      }

      #editor-canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        background: #202015;
      }

      #editor-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 240px;
        box-sizing: border-box;
        padding: 14px;
        overflow-y: auto;
        background: #24251e;
        border-left: 1px solid #4d4c3d;
        box-shadow: -10px 0 24px rgba(0, 0, 0, 0.2);
      }

      .editor-title {
        margin: 0 0 12px;
        font-size: 18px;
        font-weight: 700;
      }

      .editor-section {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #49483a;
      }

      .editor-label {
        display: block;
        margin: 0 0 7px;
        color: #cfc8ad;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      .editor-input,
      .editor-select,
      .editor-button {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #5a5948;
        border-radius: 6px;
        background: #191a15;
        color: #f0ead9;
        font: inherit;
      }

      .editor-input,
      .editor-select {
        height: 34px;
        padding: 0 9px;
      }

      .editor-button {
        min-height: 32px;
        padding: 7px 9px;
        text-align: left;
        cursor: pointer;
      }

      .editor-button:hover {
        border-color: #93a066;
        background: #242719;
      }

      .editor-button[data-active="true"] {
        border-color: #d6c36a;
        background: #3a3820;
        color: #fff6c7;
      }

      .editor-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }

      .editor-stack {
        display: grid;
        gap: 6px;
      }

      .editor-cell {
        margin-top: 12px;
        color: #d8d0b9;
        font-size: 13px;
      }

      .editor-swatch {
        display: inline-block;
        width: 10px;
        height: 10px;
        margin-right: 7px;
        border-radius: 2px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        vertical-align: -1px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="editor-canvas"></canvas>
    </div>
    <aside id="editor-panel"></aside>
    <script type="module" src="/src/editor/main.ts"></script>
  </body>
</html>
